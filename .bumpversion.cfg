[bumpversion]
current_version = 0.42.0
commit = True
tag = True

[bumpversion:file:pyproject.toml]
search = version = "{current_version}"
replace = version = "{new_version}"

[bumpversion:file:README.md]
search = Version: {current_version}
replace = Version: {new_version}

[bumpversion:file(mcp-img):docker/Dockerfile]
search = mealie-mcp[mcp]>={current_version}
replace = mealie-mcp[mcp]>={new_version}

[bumpversion:file(agent-img):docker/Dockerfile]
search = mealie-mcp[agent]>={current_version}
replace = mealie-mcp[agent]>={new_version}

[bumpversion:file:mealie_mcp/agent_server.py]
search = __version__ = "{current_version}"
replace = __version__ = "{new_version}"

[bumpversion:file:mealie_mcp/mcp_server.py]
search = __version__ = "{current_version}"
replace = __version__ = "{new_version}"
